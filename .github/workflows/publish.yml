name: Publish

# Публикация через PyPI Trusted Publishing (OIDC) — без токенов и секретов.
# Предварительно на стороне PyPI/TestPyPI нужно настроить "trusted publisher"
# для этого репозитория и окружений (environments) `testpypi` и `pypi`.
#
# Поток (см. CLAUDE.md §8): сначала репетиция на TestPyPI (ручной запуск
# workflow_dispatch с target=testpypi), затем боевой релиз на PyPI
# (создание GitHub Release → автопубликация).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Куда публиковать"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    name: publish → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Релиз идёт сразу в PyPI; TestPyPI — только ручной прогон.
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/envspec
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: publish → PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/envspec
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
